services:
  kekkin-api:
    build: ./backend/KekkinAndon.API
    container_name: kekkin-andon-api
    ports:
      - "80:8080"
    volumes:
      - ./backend/KekkinAndon.API/appsettings.json:/app/appsettings.json:ro
    environment:
      TZ: America/Sao_Paulo
      ASPNETCORE_ENVIRONMENT: Production
    restart: unless-stopped
